<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Daily Widget</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="card">
    <h2>Daily Widget</h2>

    <div class="date">
      Widget保持日付: <span id="widgetDate">読み込み中...</span>
    </div>

    <label>タイトル</label>
    <input id="title" type="text" placeholder="タイトルを入力" />

    <label>書き込み内容</label>
    <div id="items">
      <div class="item">
        <input class="item-heading" type="text" placeholder="子項目の題目を入力" />
        <textarea class="item-body" placeholder="本文を入力"></textarea>
        <button class="remove-button" onclick="removeItem(this)">×</button>
      </div>
    </div>

    <div class="row">
      <button onclick="addItem()">書き込み内容を追加</button>
    </div>

    <div class="note">
      入力内容は自動で一時保存されます。日付が変わってもすぐにはリセットしません。
      新しいNotionカードが作成され、そのカードへの書き込みが成功した場合だけリセットします。
    </div>

    <p id="message"></p>

    <div id="result" class="result hidden">
      <h3>書き込み完了内容</h3>
      <div id="resultContent"></div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
